{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile - Tower Travel</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    min-height: 100vh;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
    background-attachment: fixed;
}

.overlay {
    background: rgba(0, 0, 0, 0.7);
    min-height: 100vh;
    width: 100%;
    padding: 100px 20px 40px;
}

.header {
    width: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
    backdrop-filter: blur(8px);
    position: fixed;
    top: 0;
    z-index: 1000;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ffd54f;
}

.logo-text {
    font-size: 22px;
    color: #ffd54f;
    font-weight: bold;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
}

.nav-links li a {
    text-decoration: none;
    color: white;
    font-size: 15px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: 0.3s;
}

.nav-links li a:hover {
    color: #ffd54f;
    background: rgba(255,215,0,0.1);
}

.profile-container {
    max-width: 600px;
    margin: 0 auto;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    border: 1px solid rgba(255,215,0,0.4);
    padding: 40px;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.profile-container h2 {
    color: #ffd54f;
    text-align: center;
    margin-bottom: 30px;
}

.input-field {
    margin-bottom: 20px;
}

.input-field label {
    display: block;
    color: #ffd54f;
    margin-bottom: 8px;
    font-weight: 500;
}

.input-field input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

.input-field input:focus {
    outline: none;
    background: rgba(255,255,255,0.3);
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    margin-top: 10px;
}

.btn-primary {
    background: linear-gradient(135deg, #ffd54f, #ffb300);
    color: #1e3c72;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(255,215,0,0.5);
}

.btn-secondary {
    background: linear-gradient(135deg, #6c757d, #495057);
    color: white;
    text-decoration: none;
    display: inline-block;
    text-align: center;
}

.message {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    font-size: 14px;
    text-align: center;
}

.message.success {
    background: rgba(76,175,80,0.3);
    border: 1px solid #4CAF50;
    color: #fff;
}

.message.error {
    background: rgba(244,67,54,0.3);
    border: 1px solid #f44336;
    color: #fff;
}

@media (max-width: 768px) {
    .profile-container {
        padding: 25px;
    }
    .header {
        padding: 12px 20px;
    }
    .logo-text {
        font-size: 16px;
    }
}
</style>
</head>
<body>

<header class="header">
    <div class="logo-area">
        <img src="{% static '9.avif' %}" class="logo-img" alt="Logo">
        <span class="logo-text">TOWER TRAVEL TOURISM</span>
    </div>
    <ul class="nav-links">
        <li><a href="{% url 'index' %}">Home</a></li>
        <li><a href="{% url 'destination' %}">Destinations</a></li>
        <li><a href="{% url 'hotel' %}">Hotels</a></li>
        <li><a href="{% url 'flight' %}">Flights</a></li>
        <li><a href="{% url 'package' %}">Packages</a></li>
        <li><a href="{% url 'reviews' %}">Reviews</a></li>
        <li><a href="{% url 'my_profile' %}">Profile</a></li>
        <li><a href="{% url 'logout' %}">Logout</a></li>
    </ul>
</header>

<div class="overlay">
    <div class="profile-container">
        <h2><i class="fas fa-user-edit"></i> Edit Profile</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-field">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" value="{{ user.username }}" required>
            </div>
            <div class="input-field">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" value="{{ user.email }}" required>
            </div>
            <div class="input-field">
                <label><i class="fas fa-user-circle"></i> First Name</label>
                <input type="text" name="first_name" value="{{ user.first_name }}">
            </div>
            <div class="input-field">
                <label><i class="fas fa-user-circle"></i> Last Name</label>
                <input type="text" name="last_name" value="{{ user.last_name }}">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'my_profile' %}" class="btn btn-secondary" style="margin-top: 10px;">Cancel</a>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
